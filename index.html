<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Soccer Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #2a2a2a; color: white; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { 
            background: #4a6741; 
            border: 8px solid #3d3d3d; 
            border-radius: 12px;
            display: block;
            margin: 0 auto;
            image-rendering: pixelated;
        }
        .ui-panel { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">

    <div id="lobby" class="fixed inset-0 z-50 flex items-center justify-center ui-panel">
        <div class="bg-zinc-800 p-8 rounded-xl shadow-2xl border border-zinc-700 w-96 text-center relative">
            <h1 class="text-3xl font-bold mb-2 text-green-400">Soccer Arena</h1>
            <div id="auth-error" class="text-red-400 text-xs mb-4 hidden bg-red-900/30 p-2 rounded">Error connecting. Make sure Anonymous Auth is enabled.</div>
            
            <div id="step-1">
                <input id="nickname" type="text" placeholder="Enter Nickname" maxlength="12" class="w-full p-3 mb-4 rounded bg-zinc-900 border border-zinc-600 focus:outline-none focus:border-green-500 text-white">
                <div class="flex gap-2 mb-4">
                    <button onclick="createRoom()" class="flex-1 p-3 bg-emerald-600 hover:bg-emerald-500 rounded font-bold transition">Create Match</button>
                </div>
                <div class="flex gap-2 mb-4">
                    <input id="room-code-input" type="text" placeholder="Room Code" maxlength="4" class="w-1/2 p-3 rounded bg-zinc-900 border border-zinc-600 focus:outline-none focus:border-green-500 text-white text-center uppercase">
                    <button onclick="joinRoom()" class="w-1/2 p-3 bg-indigo-600 hover:bg-indigo-500 rounded font-bold transition">Join Match</button>
                </div>
            </div>

            <div id="step-2" class="hidden">
                <h2 class="text-xl text-white mb-4">Room: <span id="display-room-code" class="text-yellow-400 font-mono font-bold tracking-widest"></span></h2>
                <div class="flex gap-4 mb-6">
                    <button onclick="joinTeam('red')" class="flex-1 p-4 bg-red-600 hover:bg-red-500 rounded font-bold transition">Red Team</button>
                    <button onclick="joinTeam('blue')" class="flex-1 p-4 bg-blue-600 hover:bg-blue-500 rounded font-bold transition">Blue Team</button>
                </div>
                <button onclick="cancelJoin()" class="text-zinc-500 text-sm hover:text-white transition">Cancel</button>
            </div>
            
            <p class="text-zinc-400 text-sm mt-4">WASD/Arrows to Move • Space to Kick</p>
        </div>
    </div>

    <div class="relative">
        <div class="absolute top-4 left-0 right-0 flex justify-center items-center pointer-events-none px-10">
            <div class="ui-panel px-6 py-2 rounded-full flex gap-8 items-center border border-zinc-600">
                <div class="flex items-center gap-3">
                    <div class="w-3 h-3 bg-red-500 rounded-full"></div>
                    <span id="score-red" class="text-2xl font-black">0</span>
                </div>
                <div class="text-zinc-500 font-bold">-</div>
                <div class="flex items-center gap-3">
                    <span id="score-blue" class="text-2xl font-black">0</span>
                    <div class="w-3 h-3 bg-blue-500 rounded-full"></div>
                </div>
            </div>
        </div>
        
        <canvas id="gameCanvas"></canvas>
        
        <div id="goal-msg" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-7xl font-black text-yellow-400 hidden pointer-events-none drop-shadow-lg italic">
            GOAL!
        </div>
    </div>

    <div class="mt-4 flex justify-between w-full max-w-[800px] text-zinc-500 text-sm px-2">
        <div>Players: <span id="player-count">0</span> | Room: <span id="active-room-code" class="text-yellow-400 font-bold">None</span></div>
        <button onclick="leaveRoom()" class="text-red-400 hover:text-red-300 underline font-bold">Leave Match</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, deleteDoc, onSnapshot, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- Config & Init ---
    const firebaseConfig = {
        apiKey: "AIzaSyAacDt9YRIKu3_8LTwms70CwnA31WRfMIk",
        authDomain: "griffball-3eb45.firebaseapp.com",
        projectId: "griffball-3eb45",
        storageBucket: "griffball-3eb45.firebasestorage.app",
        messagingSenderId: "615795790042",
        appId: "1:615795790042:web:aedeeda9c9914797c955e3"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'griffball-3eb45';

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Field Constants
    const WIDTH = 800;
    const HEIGHT = 500;
    const PADDING = 40;
    const GOAL_SIZE = 120;
    const PLAYER_RADIUS = 15;
    const BALL_RADIUS = 10;
    
    canvas.width = WIDTH;
    canvas.height = HEIGHT;

    // Game State
    let user = null;
    let currentRoom = null;
    let isHost = false;
    let unsubPlayers = null;
    let unsubGame = null;

    let localPlayer = {
        id: null,
        name: '',
        team: 'red',
        x: 0, y: 0,
        vx: 0, vy: 0,
        kicking: false,
        lastUpdate: 0
    };

    let players = {};
    let ball = { x: WIDTH/2, y: HEIGHT/2, vx: 0, vy: 0 };
    let gameState = { scoreRed: 0, scoreBlue: 0, lastGoal: 0 };
    
    const keys = {};

    function showError(msg) {
        const errDiv = document.getElementById('auth-error');
        errDiv.innerText = msg;
        errDiv.classList.remove('hidden');
        setTimeout(() => errDiv.classList.add('hidden'), 4000);
    }

    // --- Interaction ---
    window.createRoom = async () => {
        if (!user) return showError("Still connecting to database...");
        const code = Math.random().toString(36).substring(2, 6).toUpperCase();
        currentRoom = code;
        isHost = true;
        
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
        document.getElementById('display-room-code').innerText = code;
        document.getElementById('active-room-code').innerText = code;

        // Create room instance in Firestore
        const gameRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code);
        await setDoc(gameRef, {
            createdAt: serverTimestamp(),
            host: user.uid,
            ball: { x: WIDTH/2, y: HEIGHT/2, vx: 0, vy: 0 },
            scores: { red: 0, blue: 0 }
        });
    };

    window.joinRoom = async () => {
        if (!user) return showError("Still connecting to database...");
        const code = document.getElementById('room-code-input').value.trim().toUpperCase();
        if(!code) return showError("Enter a Room Code");
        
        // Check if room instance exists
        const gameRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code);
        const snap = await getDoc(gameRef);
        if(!snap.exists()) {
            return showError("Room not found! Check code.");
        }

        currentRoom = code;
        isHost = false;
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
        document.getElementById('display-room-code').innerText = code;
        document.getElementById('active-room-code').innerText = code;
    };

    window.cancelJoin = () => {
        currentRoom = null;
        isHost = false;
        document.getElementById('step-1').classList.remove('hidden');
        document.getElementById('step-2').classList.add('hidden');
    }

    window.joinTeam = async (team) => {
        const nick = document.getElementById('nickname').value.trim() || "Player";
        localPlayer.name = nick;
        localPlayer.team = team;
        localPlayer.x = team === 'red' ? 150 : WIDTH - 150;
        localPlayer.y = HEIGHT / 2;
        
        document.getElementById('lobby').style.display = 'none';
        
        setupNetworkListeners();
        await savePlayerState();
    };

    window.leaveRoom = async () => {
        if (!currentRoom) return;
        
        if (unsubPlayers) unsubPlayers();
        if (unsubGame) unsubGame();
        
        if (user) {
            // Remove player doc
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', `room_${currentRoom}_players`, user.uid));
            
            // If Host, delete the match instance entirely
            if (isHost) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoom));
            }
        }

        // Reset state & UI
        currentRoom = null;
        isHost = false;
        players = {};
        document.getElementById('active-room-code').innerText = 'None';
        document.getElementById('lobby').style.display = 'flex';
        document.getElementById('step-1').classList.remove('hidden');
        document.getElementById('step-2').classList.add('hidden');
        resetPositions();
    };

    // --- Networking ---
    async function initAuth() {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
        } else {
            await signInAnonymously(auth);
        }
    }

    onAuthStateChanged(auth, (u) => {
        if (u) {
            user = u;
            localPlayer.id = u.uid;
        } else {
            showError("Authentication lost.");
        }
    });

    function setupNetworkListeners() {
        if (!user || !currentRoom) return;

        // Listen for players in this specific room
        const playersCol = collection(db, 'artifacts', appId, 'public', 'data', `room_${currentRoom}_players`);
        
        unsubPlayers = onSnapshot(playersCol, (snapshot) => {
            // Rebuild the players dictionary completely on every update 
            // to avoid missing fast-paced docChanges() events
            const updatedPlayers = {};
            
            snapshot.docs.forEach(doc => {
                if (doc.id !== user.uid) {
                    updatedPlayers[doc.id] = doc.data();
                }
            });
            
            players = updatedPlayers;
            
            const countDisplay = document.getElementById('player-count');
            if(countDisplay) countDisplay.innerText = snapshot.size;
            
        }, (err) => console.error("Player Sync Error:", err));

        // Listen for room game state (ball, score)
        const gameDoc = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoom);
        unsubGame = onSnapshot(gameDoc, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                if (data.ball) {
                    ball.x = data.ball.x;
                    ball.y = data.ball.y;
                    ball.vx = data.ball.vx;
                    ball.vy = data.ball.vy;
                }
                if (data.scores) {
                    gameState.scoreRed = data.scores.red;
                    gameState.scoreBlue = data.scores.blue;
                    updateScoreUI();
                }
            } else {
                // Room document was deleted (Host left the match)
                if (!isHost && currentRoom) {
                    showError("The host ended the match.");
                    window.leaveRoom();
                }
            }
        }, (err) => console.error("Game Sync Error:", err));
    }

    async function savePlayerState() {
        if (!user || !currentRoom) return;
        const playerRef = doc(db, 'artifacts', appId, 'public', 'data', `room_${currentRoom}_players`, user.uid);
        
        // Explicitly map out properties to prevent undefined values
        await setDoc(playerRef, {
            id: user.uid,
            name: localPlayer.name,
            team: localPlayer.team,
            x: localPlayer.x,
            y: localPlayer.y,
            vx: localPlayer.vx,
            vy: localPlayer.vy,
            kicking: localPlayer.kicking,
            lastSeen: serverTimestamp()
        }, { merge: true });
    }

    async function updateBallOnServer() {
        if (!user || !currentRoom) return;
        const gameRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoom);
        await setDoc(gameRef, {
            ball: { x: ball.x, y: ball.y, vx: ball.vx, vy: ball.vy },
            scores: { red: gameState.scoreRed, blue: gameState.scoreBlue }
        }, { merge: true });
    }

    // --- Physics ---
    function updatePhysics() {
        // Only run physics if actively in a room and pitch is shown
        if (!currentRoom || document.getElementById('lobby').style.display !== 'none') return;

        // 1. Local Player Movement
        const accel = 0.5;
        const friction = 0.94;
        
        if (keys['ArrowUp'] || keys['w']) localPlayer.vy -= accel;
        if (keys['ArrowDown'] || keys['s']) localPlayer.vy += accel;
        if (keys['ArrowLeft'] || keys['a']) localPlayer.vx -= accel;
        if (keys['ArrowRight'] || keys['d']) localPlayer.vx += accel;

        localPlayer.vx *= friction;
        localPlayer.vy *= friction;
        localPlayer.x += localPlayer.vx;
        localPlayer.y += localPlayer.vy;

        localPlayer.x = Math.max(PADDING + PLAYER_RADIUS, Math.min(WIDTH - PADDING - PLAYER_RADIUS, localPlayer.x));
        localPlayer.y = Math.max(PADDING + PLAYER_RADIUS, Math.min(HEIGHT - PADDING - PLAYER_RADIUS, localPlayer.y));
        
        // Ensure kick state is active while holding space
        localPlayer.kicking = !!keys[' '];

        // 2. Ball Physics
        const ballFriction = 0.985;
        ball.vx *= ballFriction;
        ball.vy *= ballFriction;
        ball.x += ball.vx;
        ball.y += ball.vy;

        if (ball.y < PADDING + BALL_RADIUS || ball.y > HEIGHT - PADDING - BALL_RADIUS) {
            ball.vy *= -0.7;
            ball.y = ball.y < HEIGHT / 2 ? PADDING + BALL_RADIUS : HEIGHT - PADDING - BALL_RADIUS;
        }

        const inGoalRange = (ball.y > HEIGHT/2 - GOAL_SIZE/2 && ball.y < HEIGHT/2 + GOAL_SIZE/2);
        
        if (!inGoalRange) {
            if (ball.x < PADDING + BALL_RADIUS || ball.x > WIDTH - PADDING - BALL_RADIUS) {
                ball.vx *= -0.7;
                ball.x = ball.x < WIDTH / 2 ? PADDING + BALL_RADIUS : WIDTH - PADDING - BALL_RADIUS;
            }
        } else {
            if (ball.x < 0) score('blue');
            if (ball.x > WIDTH) score('red');
        }

        // 3. Player - Ball Collision (Checking ALL players)
        let localPlayerTouchedBall = false;
        const allPlayers = [localPlayer, ...Object.values(players)];

        for (const p of allPlayers) {
            if (typeof p.x !== 'number' || typeof p.y !== 'number') continue;

            const dx = ball.x - p.x;
            const dy = ball.y - p.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const minDist = PLAYER_RADIUS + BALL_RADIUS;

            if (dist < minDist) {
                const angle = Math.atan2(dy, dx);
                const force = 2.0;
                
                // Account for network player velocity if available, else assume 0
                const pvx = p.vx || 0;
                const pvy = p.vy || 0;
                
                ball.vx = Math.cos(angle) * (Math.abs(pvx) + force);
                ball.vy = Math.sin(angle) * (Math.abs(pvy) + force);
                
                if (p.kicking) {
                    ball.vx *= 3;
                    ball.vy *= 3;
                }
                
                const overlap = minDist - dist;
                ball.x += Math.cos(angle) * overlap;
                ball.y += Math.sin(angle) * overlap;

                // Only take network authority if the local player is the one touching it
                if (p === localPlayer) {
                    localPlayerTouchedBall = true;
                }
            }
        }

        // If WE hit the ball, tell the server immediately
        if (localPlayerTouchedBall) {
            updateBallOnServer();
        }

        // Periodic state sync for other players (throttled slightly to prevent rapid-fire dropping)
        if (Date.now() - localPlayer.lastUpdate > 60) {
            savePlayerState();
            localPlayer.lastUpdate = Date.now();
        }
    }

    function score(team) {
        if (!isHost) return; // Only host handles goal events
        if (Date.now() - gameState.lastGoal < 3000) return;
        
        if (team === 'red') gameState.scoreRed++;
        else gameState.scoreBlue++;
        
        gameState.lastGoal = Date.now();
        showGoalUI();
        resetPositions();
        updateBallOnServer();
    }

    function resetPositions() {
        ball = { x: WIDTH/2, y: HEIGHT/2, vx: 0, vy: 0 };
        localPlayer.vx = 0; localPlayer.vy = 0;
        localPlayer.x = localPlayer.team === 'red' ? 150 : WIDTH - 150;
        localPlayer.y = HEIGHT / 2;
        if(isHost && currentRoom) updateBallOnServer();
    }

    // --- Rendering ---
    function draw() {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);
        
        ctx.fillStyle = '#4a6741';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 40;
        for(let i=0; i<WIDTH; i+=80) {
            if((i/80)%2 === 0) ctx.fillRect(i, 0, 40, HEIGHT);
        }

        ctx.strokeStyle = 'white';
        ctx.lineWidth = 3;
        ctx.strokeRect(PADDING, PADDING, WIDTH - 2*PADDING, HEIGHT - 2*PADDING);
        
        ctx.beginPath();
        ctx.moveTo(WIDTH/2, PADDING);
        ctx.lineTo(WIDTH/2, HEIGHT-PADDING);
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(WIDTH/2, HEIGHT/2, 60, 0, Math.PI*2);
        ctx.stroke();

        ctx.strokeStyle = 'red';
        ctx.strokeRect(0, HEIGHT/2 - GOAL_SIZE/2, PADDING, GOAL_SIZE);
        ctx.strokeStyle = 'blue';
        ctx.strokeRect(WIDTH - PADDING, HEIGHT/2 - GOAL_SIZE/2, PADDING, GOAL_SIZE);

        Object.values(players).forEach(p => drawDisc(p));
        
        // Only draw local player if they successfully joined the room
        if (currentRoom && document.getElementById('lobby').style.display === 'none') {
            drawDisc(localPlayer, true);
        }

        ctx.fillStyle = 'white';
        ctx.shadowBlur = 10;
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;

        requestAnimationFrame(() => {
            updatePhysics();
            draw();
        });
    }

    function drawDisc(p, isLocal = false) {
        // Strict rendering guard to prevent silently failing canvas arcs
        if (typeof p.x !== 'number' || typeof p.y !== 'number' || isNaN(p.x) || isNaN(p.y)) return;
        
        const color = p.team === 'red' ? '#ef4444' : '#3b82f6';
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, PLAYER_RADIUS, 0, Math.PI*2);
        ctx.fill();
        
        if (isLocal) {
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        if (p.kicking) {
            ctx.strokeStyle = 'yellow';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(p.x, p.y, PLAYER_RADIUS + 4, 0, Math.PI*2);
            ctx.stroke();
        }

        ctx.fillStyle = 'white';
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(p.name || "Player", p.x, p.y + PLAYER_RADIUS + 15);
    }

    function updateScoreUI() {
        document.getElementById('score-red').innerText = gameState.scoreRed;
        document.getElementById('score-blue').innerText = gameState.scoreBlue;
    }

    function showGoalUI() {
        const msg = document.getElementById('goal-msg');
        msg.classList.remove('hidden');
        setTimeout(() => msg.classList.add('hidden'), 2000);
    }

    // --- Inputs ---
    window.addEventListener('keydown', e => {
        if (!keys[e.key]) {
            keys[e.key] = true;
            // Instantly show kicking aura to others
            if (e.key === ' ' && currentRoom) savePlayerState(); 
        }
    });
    
    window.addEventListener('keyup', e => {
        keys[e.key] = false;
        if(e.key === ' ') {
            // Instantly remove kicking aura for others
            if(currentRoom) savePlayerState();
        }
    });

    // Cleanup instance when closing tab
    window.addEventListener('beforeunload', () => {
        window.leaveRoom();
    });

    // Start rendering canvas pitch immediately
    draw();

    // Authenticate in the background
    initAuth().catch(err => {
        console.error("Auth Error:", err);
        showError("Database connection failed. Check your Firebase Rules & Auth settings.");
    });

</script>
</body>
</html>
